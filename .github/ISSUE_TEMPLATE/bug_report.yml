name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Paste this URL: …
        2. Pick format …
        3. Press Scarica …
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Source site / URL (if shareable)
      description: The site or a redacted URL helps a lot — extraction is site-specific.
  - type: input
    id: version
    attributes:
      label: App version
      description: See the version in the Help window (or *Novità*).
      placeholder: "1.3.1"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version & chip
      placeholder: "macOS 14.5, Apple Silicon"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant console output
      render: shell
