name: Release

# Cut a GitHub Release when a v* tag is pushed (e.g. `git push --tags` after
# scripts/release.sh). Builds the Release .app, zips it, and attaches the zip
# with the changelog section for that version as the release notes.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # required for `gh release create`

jobs:
  release:
    name: Build & publish release
    # macos-15 ships Xcode 16, which can read the objectVersion 77 project
    # XcodeGen 2.45+ generates (matches the CI app-build job).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Generate Xcode project
        working-directory: App
        run: xcodegen generate

      - name: Build (Release)
        run: |
          xcodebuild \
            -project App/VideoDownloader.xcodeproj \
            -scheme VideoDownloader \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            build

      - name: Package .app
        run: |
          APP="build/Build/Products/Release/Video Downloader.app"
          [ -d "$APP" ] || { echo "::error::built app not found at $APP"; exit 1; }
          # ditto (not zip) preserves the bundle's symlinks + ad-hoc signature
          # and skips the __MACOSX/._ resource-fork junk `zip` leaves behind.
          ditto -c -k --keepParent "$APP" "Video-Downloader.app.zip"
          ls -lh "Video-Downloader.app.zip"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > notes.md
          # Fall back to a generic note if the version has no changelog section.
          [ -s notes.md ] || printf 'Release %s.\n' "$VERSION" > notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.notes.outputs.version }}"
          # Tag a pre-release (SemVer pre-release like 1.4.0-beta.1) as such.
          PRERELEASE=""
          case "$VERSION" in *-*) PRERELEASE="--prerelease" ;; esac
          gh release create "$GITHUB_REF_NAME" "Video-Downloader.app.zip" \
            --title "Video Downloader $VERSION" \
            --notes-file notes.md \
            $PRERELEASE
