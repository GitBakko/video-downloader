name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Library tests (swift test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  app-build:
    name: App build (xcodebuild)
    # macos-15 ships Xcode 16, which can read the objectVersion 77 project
    # XcodeGen 2.45+ generates (Xcode 15 on macos-14 cannot).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        # The runner pre-taps aws/tap untrusted, which makes `brew install`
        # print a tap-trust warning; untap it first to keep the log clean.
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen
      - name: Generate Xcode project
        working-directory: App
        run: xcodegen generate
      - name: Build app
        run: |
          xcodebuild \
            -project App/VideoDownloader.xcodeproj \
            -scheme VideoDownloader \
            -configuration Debug \
            -destination 'platform=macOS' \
            build
