name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Library tests (swift test)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  app-build:
    name: App build (xcodebuild)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: App
        run: xcodegen generate
      - name: Build app
        run: |
          xcodebuild \
            -project App/VideoDownloader.xcodeproj \
            -scheme VideoDownloader \
            -configuration Debug \
            -destination 'platform=macOS' \
            build
