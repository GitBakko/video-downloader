name: VideoDownloader

options:
  bundleIdPrefix: com.bakko
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

# Local SwiftPM package at the repo root (one level up from App/).
packages:
  VideoDownloaderCore:
    path: ..

targets:
  VideoDownloader:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.plist"
          - "*.entitlements"
          - "*.xcodeproj"
          - ".DS_Store"
      # Bundle the changelog so the in-app "Novità" window always shows the
      # current release history (parsed by ChangelogParser).
      - path: ../CHANGELOG.md
        buildPhase: resources
    dependencies:
      - package: VideoDownloaderCore
        product: VideoDownloaderCore
    settings:
      base:
        PRODUCT_NAME: "Video Downloader"
        PRODUCT_BUNDLE_IDENTIFIER: com.bakko.VideoDownloader
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: VideoDownloader.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "5.9"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  VideoDownloader:
    build:
      targets:
        VideoDownloader: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
